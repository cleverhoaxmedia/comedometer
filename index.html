<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Improv-O-Meter 🎭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    /* ── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg:        #0e0a0a;
      --surface:   #1c1212;
      --border:    #2e1f1f;
      --yay:       #f5c842;
      --yay-dim:   #7a6218;
      --boo:       #e03535;
      --boo-dim:   #6e1a1a;
      --text:      #f2ece8;
      --muted:     #7a6a65;
      --curtain:   #8b1a1a;
      --gold:      #d4a843;
      --ff-display: 'Abril Fatface', serif;
      --ff-body:    'DM Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── CURTAIN BACKGROUND ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(139,26,26,0.18) 0%, transparent 70%),
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 38px,
          rgba(255,255,255,0.015) 38px,
          rgba(255,255,255,0.015) 40px
        );
      pointer-events: none;
      z-index: 0;
    }

    /* ── VIEWS ──────────────────────────────────────────────────── */
    .view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      padding: 2rem 1.5rem;
      gap: 1.25rem;
      text-align: center;
      position: relative;
      z-index: 1;
      overflow-y: auto;
    }
    .view.active { display: flex; }

    /* ── TYPOGRAPHY ─────────────────────────────────────────────── */
    .display {
      font-family: var(--ff-display);
      font-size: clamp(3rem, 12vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: 0.01em;
      color: var(--text);
    }
    .display em {
      font-style: normal;
      color: var(--gold);
    }
    .sub {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── SPOTLIGHT ──────────────────────────────────────────────── */
    .spotlight {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,200,66,0.12) 0%, transparent 70%);
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ── DIVIDER ────────────────────────────────────────────────── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      margin: 0.25rem auto;
    }

    /* ── BUTTONS ────────────────────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      border: none;
      border-radius: 0.9rem;
      cursor: pointer;
      font-family: var(--ff-body);
      font-weight: 700;
      font-size: 1.05rem;
      padding: 1rem 1.5rem;
      width: 100%;
      max-width: 340px;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
      letter-spacing: 0.02em;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.96); }

    .btn-audience {
      background: var(--yay);
      color: #1a0e00;
      font-size: 1.2rem;
      padding: 1.15rem 1.5rem;
      box-shadow: 0 4px 24px rgba(245,200,66,0.25);
    }
    .btn-audience:hover { box-shadow: 0 4px 32px rgba(245,200,66,0.4); }

    .btn-backstage {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .btn-backstage:hover { border-color: var(--muted); color: var(--text); }

    /* ── AUDIENCE VOTE BUTTONS ──────────────────────────────────── */
    .vote-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      max-width: 360px;
    }

    .vote-btn {
      border: none;
      border-radius: 1.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 2rem 1rem;
      height: 170px;
      transition: transform 0.1s, filter 0.1s;
      position: relative;
      overflow: hidden;
    }
    .vote-btn:active { transform: scale(0.93); }

    .vote-btn-yay {
      background: linear-gradient(160deg, #f5c842 0%, #d4a843 100%);
      box-shadow: 0 8px 32px rgba(245,200,66,0.3);
    }
    .vote-btn-boo {
      background: linear-gradient(160deg, #e03535 0%, #a01f1f 100%);
      box-shadow: 0 8px 32px rgba(224,53,53,0.3);
    }

    .vote-btn .icon   { font-size: 3.2rem; line-height: 1; }
    .vote-btn .label  {
      font-family: var(--ff-display);
      font-size: 1.4rem;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .vote-btn-yay .label { color: #1a0e00; text-shadow: none; }

    /* ripple */
    .vote-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      border-radius: inherit;
      transition: opacity 0.3s;
    }
    .vote-btn.tapped::after { opacity: 0.25; }

    .vote-note {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.4rem;
      transition: opacity 0.3s;
    }

    /* ── BACK BUTTON ────────────────────────────────────────────── */
    .back-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 50;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      color: var(--muted);
      font-family: var(--ff-body);
      font-size: 0.8rem;
      padding: 0.45rem 0.8rem;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .back-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── METER LAYOUT ───────────────────────────────────────────── */
    .meter-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }
    .meter-title {
      font-family: var(--ff-display);
      font-size: clamp(1.6rem, 6vw, 2.4rem);
      color: var(--gold);
      letter-spacing: 0.04em;
    }

    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      width: 100%;
      max-width: 380px;
    }

    .score-card {
      background: var(--surface);
      border-radius: 1.2rem;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      position: relative;
      overflow: hidden;
    }
    .score-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1.5px solid transparent;
    }
    .score-card.yay::before { border-color: var(--yay-dim); }
    .score-card.boo::before { border-color: var(--boo-dim); }

    .score-card .icon   { font-size: 1.8rem; }
    .score-card .num    {
      font-family: var(--ff-display);
      font-size: 3.8rem;
      line-height: 1;
      transition: color 0.3s;
    }
    .score-card.yay .num { color: var(--yay); }
    .score-card.boo .num { color: var(--boo); }
    .score-card .tag    { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* pulse on new vote */
    @keyframes pulseYay { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    @keyframes pulseBoo { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }
    .score-card.yay.pulse .num { animation: pulseYay 0.35s ease; }
    .score-card.boo.pulse .num { animation: pulseBoo 0.35s ease; }

    /* ── SENTIMENT BAR ──────────────────────────────────────────── */
    .bar-wrap {
      width: 100%;
      max-width: 380px;
    }
    .bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .bar-track {
      background: var(--boo-dim);
      border-radius: 999px;
      height: 14px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      background: linear-gradient(90deg, var(--yay) 0%, #d4a843 100%);
      height: 100%;
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 6px;
    }

    /* ── PERFORMER ROW ──────────────────────────────────────────── */
    .performer-row {
      display: flex;
      gap: 0.6rem;
      width: 100%;
      max-width: 380px;
    }
    .performer-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 0.95rem;
      padding: 0.7rem 1rem;
    }
    .performer-input:focus { outline: 2px solid var(--gold); border-color: transparent; }
    .performer-input::placeholder { color: var(--muted); }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--boo-dim);
      border-radius: 0.75rem;
      color: var(--boo);
      font-family: var(--ff-body);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.7rem 1rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-reset:hover { background: rgba(224,53,53,0.1); }

    /* ── THRESHOLD BADGE ────────────────────────────────────────── */
    .threshold-badge {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.3rem 0.8rem;
      letter-spacing: 0.04em;
    }
    .threshold-badge strong { color: var(--gold); }

    /* ── SOUND FLASH ────────────────────────────────────────────── */
    .sound-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.1s;
      border-radius: 0;
    }
    .sound-flash.yay-flash { background: radial-gradient(ellipse at center, rgba(245,200,66,0.25), transparent 70%); }
    .sound-flash.boo-flash { background: radial-gradient(ellipse at center, rgba(224,53,53,0.28), transparent 70%); }
    .sound-flash.show { opacity: 1; }

    /* ── MODAL ──────────────────────────────────────────────────── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      backdrop-filter: blur(4px);
    }
    .modal-bg.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      text-align: center;
    }
    .modal-icon { font-size: 2.5rem; }
    .modal h3 {
      font-family: var(--ff-display);
      font-size: 1.5rem;
      color: var(--gold);
    }
    .modal p { font-size: 0.85rem; color: var(--muted); }

    .modal-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      text-align: center;
      letter-spacing: 0.25em;
    }
    .modal-input:focus { outline: 2px solid var(--gold); border-color: transparent; }

    .modal-error {
      color: var(--boo);
      font-size: 0.8rem;
      min-height: 1rem;
    }

    .btn-enter {
      background: var(--gold);
      color: #1a0e00;
      font-family: var(--ff-body);
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 0.75rem;
      padding: 0.85rem 1.5rem;
      width: 100%;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.1s;
    }
    .btn-enter:hover { opacity: 0.88; }

    .btn-cancel {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: var(--ff-body);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0.25rem;
    }
    .btn-cancel:hover { color: var(--text); }

    /* ── AUDIENCE PERFORMER LABEL ───────────────────────────────── */
    .performer-label {
      font-family: var(--ff-display);
      font-size: clamp(1.4rem, 6vw, 2rem);
      color: var(--text);
      min-height: 2.4rem;
    }
    .performer-label em {
      font-style: normal;
      color: var(--gold);
    }

    /* ── CONNECTIONS STATUS ─────────────────────────────────────── */
    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
      transition: background 0.3s;
    }
    .status-dot.live { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.6); }

    /* ── TOAST ──────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.6rem 1.2rem;
      font-size: 0.85rem;
      color: var(--text);
      z-index: 300;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<!-- ── FLASH OVERLAY ───────────────────────────────────────────── -->
<div class="sound-flash yay-flash" id="flash-yay"></div>
<div class="sound-flash boo-flash" id="flash-boo"></div>

<!-- ── TOAST ──────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════════════
     HOME VIEW
════════════════════════════════════════════════════════════════ -->
<div class="view active" id="view-home">
  <div class="spotlight"></div>

  <p class="sub">🎭 Welcome to</p>
  <h1 class="display">Improv<br/><em>O-Meter</em></h1>
  <div class="divider"></div>
  <p class="sub">Let the performers know what you think</p>

  <button class="btn btn-audience" onclick="showAudience()">
    🙋 I'm in the Audience
  </button>
  <button class="btn btn-backstage" onclick="openPasswordModal()">
    🎬 Backstage Access
  </button>
</div>

<!-- ══════════════════════════════════════════════════════════════
     AUDIENCE VIEW
════════════════════════════════════════════════════════════════ -->
<div class="view" id="view-audience">
  <button class="back-btn" onclick="showHome()">← Back</button>

  <p class="sub">
    <span class="status-dot" id="audience-status"></span>Live
  </p>
  <div class="performer-label" id="audience-label">What do you think?</div>
  <p class="sub">Tap your verdict!</p>

  <div class="vote-grid">
    <button class="vote-btn vote-btn-yay" id="btn-yay" onclick="castVote('yay')">
      <span class="icon">👍</span>
      <span class="label">YAY!</span>
    </button>
    <button class="vote-btn vote-btn-boo" id="btn-boo" onclick="castVote('boo')">
      <span class="icon">👎</span>
      <span class="label">BOO!</span>
    </button>
  </div>

  <p class="vote-note" id="vote-note"></p>
</div>

<!-- ══════════════════════════════════════════════════════════════
     METER VIEW
════════════════════════════════════════════════════════════════ -->
<div class="view" id="view-meter">
  <button class="back-btn" onclick="showHome()">← Back</button>

  <div class="meter-header">
    <p class="sub">
      <span class="status-dot" id="meter-status"></span>Live feed
    </p>
    <h2 class="meter-title">Watch-O-Meter</h2>
  </div>

  <div class="performer-row">
    <input
      class="performer-input"
      id="performer-input"
      type="text"
      placeholder="Performer name…"
      oninput="setPerformerName(this.value)"
      maxlength="40"
    />
    <button class="btn-reset" onclick="resetVotes()">Reset</button>
  </div>

  <div class="scores">
    <div class="score-card yay" id="card-yay">
      <span class="icon">👍</span>
      <span class="num" id="yay-count">0</span>
      <span class="tag">Yay!</span>
    </div>
    <div class="score-card boo" id="card-boo">
      <span class="icon">👎</span>
      <span class="num" id="boo-count">0</span>
      <span class="tag">Boo!</span>
    </div>
  </div>

  <div class="bar-wrap">
    <div class="bar-labels">
      <span>👍 Yay</span>
      <span>Boo 👎</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-fill" style="width:50%"></div>
    </div>
  </div>

  <p class="threshold-badge">
    Sound triggers every <strong id="threshold-num">10</strong> votes
  </p>
</div>

<!-- ══════════════════════════════════════════════════════════════
     PASSWORD MODAL
════════════════════════════════════════════════════════════════ -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-icon">🔐</div>
    <h3>Backstage</h3>
    <p>For show operators only</p>
    <input
      class="modal-input"
      id="pw-input"
      type="password"
      placeholder="••••••"
      onkeydown="if(event.key==='Enter') submitPassword()"
    />
    <p class="modal-error" id="pw-error"></p>
    <button class="btn-enter" onclick="submitPassword()">Enter</button>
    <button class="btn-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>


<!-- ══════════════════════════════════════════════════════════════
     APP LOGIC
════════════════════════════════════════════════════════════════ -->
<script>
// ================================================================
//  ★  CONFIG — edit these values before deploying  ★
// ================================================================
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBYZXeBivsWQm7kHRXOIhaTTnEK8IdNCTc",
  authDomain:        "comedometer.firebaseapp.com",
  databaseURL:       "https://comedometer-default-rtdb.firebaseio.com",
  projectId:         "comedometer",
  storageBucket:     "comedometer.firebasestorage.app",
  messagingSenderId: "822686569264",
  appId:             "1:822686569264:web:3bbb555ad0357dab8deef5"
};

const BACKSTAGE_PASSWORD = "test";  // 🔐 change this!
const SOUND_THRESHOLD    = 10;           // votes between each sound trigger
// ================================================================

// ── Firebase ────────────────────────────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
const db          = firebase.database();
const votesRef    = db.ref('votes');
const nameRef     = db.ref('performerName');

document.getElementById('threshold-num').textContent = SOUND_THRESHOLD;

// ── State ────────────────────────────────────────────────────────
let audioCtx        = null;
let lastYaySound    = 0;
let lastBooSound    = 0;
let meterActive     = false;
let audienceActive  = false;
let firstMeterLoad  = true;

// ── Navigation ──────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome()     { showView('view-home'); }
function showAudience() {
  showView('view-audience');
  startAudienceListener();
}
function showMeter() {
  showView('view-meter');
  startMeterListener();
}

// ── Password Modal ───────────────────────────────────────────────
function openPasswordModal() {
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  setTimeout(() => document.getElementById('pw-input').focus(), 120);
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function submitPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === BACKSTAGE_PASSWORD) {
    closeModal();
    firstMeterLoad = true;
    showMeter();
  } else {
    document.getElementById('pw-error').textContent = 'Wrong password — try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

// ── Audience Voting ──────────────────────────────────────────────
let voteCooldown = false;

function castVote(type) {
  if (voteCooldown) return;
  voteCooldown = true;

  const btn = document.getElementById(type === 'yay' ? 'btn-yay' : 'btn-boo');
  btn.classList.add('tapped');
  setTimeout(() => btn.classList.remove('tapped'), 300);

  const note = document.getElementById('vote-note');
  note.textContent = type === 'yay' ? '🎉 Yay cast!' : '😤 Boo cast!';

  votesRef.child(type).set(firebase.database.ServerValue.increment(1))
    .catch(() => {
      note.textContent = '⚠️ Connection error — check Firebase config.';
    });

  setTimeout(() => {
    voteCooldown = false;
    note.textContent = '';
  }, 1400);
}

// ── Audience name listener ───────────────────────────────────────
function startAudienceListener() {
  if (audienceActive) return;
  audienceActive = true;

  nameRef.on('value', snap => {
    const name = snap.val() || '';
    const el = document.getElementById('audience-label');
    el.innerHTML = name.trim()
      ? `How's <em>${escHtml(name.trim())}</em> doing?`
      : 'What do you think?';
  });

  document.getElementById('audience-status').classList.add('live');
}

// ── Meter Listener ───────────────────────────────────────────────
function startMeterListener() {
  if (meterActive) return;
  meterActive = true;

  votesRef.on('value', snap => {
    const data = snap.val() || {};
    const yay  = data.yay || 0;
    const boo  = data.boo || 0;

    // Update UI
    updateCount('yay-count', 'card-yay', yay);
    updateCount('boo-count', 'card-boo', boo);

    const total = yay + boo;
    const pct   = total === 0 ? 50 : Math.round(yay / total * 100);
    document.getElementById('bar-fill').style.width = pct + '%';

    document.getElementById('meter-status').classList.add('live');

    // Sound — skip on initial load to avoid replaying old counts
    if (firstMeterLoad) {
      lastYaySound = yay;
      lastBooSound = boo;
      firstMeterLoad = false;
    } else {
      checkSound(yay, boo);
    }
  });

  // Sync performer name input
  nameRef.on('value', snap => {
    const inp = document.getElementById('performer-input');
    const remote = snap.val() || '';
    if (document.activeElement !== inp) inp.value = remote;
  });
}

let prevYay = 0, prevBoo = 0;

function updateCount(id, cardId, val) {
  const el = document.getElementById(id);
  const card = document.getElementById(cardId);
  if (el.textContent !== String(val)) {
    el.textContent = val;
    card.classList.remove('pulse');
    void card.offsetWidth;
    card.classList.add('pulse');
    setTimeout(() => card.classList.remove('pulse'), 400);
  }
}

// ── Sound Triggers ───────────────────────────────────────────────
function checkSound(yay, boo) {
  if (yay > 0 && Math.floor(yay / SOUND_THRESHOLD) > Math.floor(lastYaySound / SOUND_THRESHOLD)) {
    lastYaySound = yay;
    triggerFlash('yay');
    playYay();
    showToast('🎉 Crowd goes wild!');
  }
  if (boo > 0 && Math.floor(boo / SOUND_THRESHOLD) > Math.floor(lastBooSound / SOUND_THRESHOLD)) {
    lastBooSound = boo;
    triggerFlash('boo');
    playBoo();
    showToast('😤 The crowd is unhappy…');
  }
}

function triggerFlash(type) {
  const el = document.getElementById(type === 'yay' ? 'flash-yay' : 'flash-boo');
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 700);
}

// ── Reset + Performer Name ────────────────────────────────────────
function resetVotes() {
  if (!confirm('Reset all vote counts to zero?')) return;
  votesRef.set({ yay: 0, boo: 0 });
  lastYaySound = 0;
  lastBooSound = 0;
  firstMeterLoad = false; // don't suppress sound checks after reset
}

function setPerformerName(val) {
  nameRef.set(val.trim() || null);
}

// ── Web Audio ────────────────────────────────────────────────────
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playYay() {
  const ctx = getCtx();
  // Triumphant ascending arpeggio: C E G C (major chord)
  [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.14;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.32, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t); osc.stop(t + 0.55);
  });
}

function playBoo() {
  const ctx = getCtx();
  // Classic sad trombone "wah-wah-wah-waaaah"
  const wah = [
    [0,    440, 392],
    [0.28, 392, 349],
    [0.56, 349, 311],
    [0.84, 311, 196],
  ];
  wah.forEach(([start, from, to]) => {
    const osc    = ctx.createOscillator();
    const gain   = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    filter.type = 'bandpass'; filter.Q.value = 4;
    filter.frequency.setValueAtTime(900, ctx.currentTime + start);
    filter.frequency.linearRampToValueAtTime(400, ctx.currentTime + start + 0.26);
    osc.frequency.setValueAtTime(from, ctx.currentTime + start);
    osc.frequency.linearRampToValueAtTime(to,   ctx.currentTime + start + 0.26);
    const t = ctx.currentTime + start;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.28, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.32);
  });
}

// unlock AudioContext on first tap
document.addEventListener('click', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}, { once: true });

// ── Toast ─────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Utility ──────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
